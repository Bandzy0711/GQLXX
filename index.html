	       <style>
	           * { margin: 0; padding: 0; box-sizing: border-box; }

	             font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

	           }
	   
	           #content { 
	             padding-top: 50px; 
	             padding-bottom: 60px; 
	             height: 100%; 
	             overflow-y: auto;
	             overflow-x: hidden;
	           }
	   
	           .page {

	           }
	   
	           /* 引导页 */

	               position: fixed; 
	               top: 0; 
	               left: 0; 
	               width: 100%;

	               width: 100%;
	           }
	           .guide-title {
	               font-size: 36px;
	               font-weight: bold;
	               color: #FFD700;
	               margin-bottom: 10px;
	               text-shadow: 0 2px 10px rgba(0,0,0,0.5);
	           }
	           .guide-subtitle {
	               font-size: 16px;
	               color: #aaa;
	               margin-bottom: 50px;
	           }
	           .guide-card {

	               border-radius: 16px;

	               margin-bottom: 40px;
	           }

	               background: #FFD700;
	               color: #1a1a1a;
	               border: none;
	               border-radius: 12px;
	               font-size: 18px;
	               font-weight: bold;
	               cursor: pointer;

	           }
	           .enter-btn:active {
	               transform: scale(0.98);

	           }
	   
	           /* 主界面 */
	           #main-app { display: none; width: 100%; height: 100vh; position: relative; }
	           #header { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; z-index: 100; border-bottom: 1px solid #444; }

	           #back-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; display: none; }
	   
	           .info-card { background: #2a2a2a; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
	           .card-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #FFD700; }
	           .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #444; }
	           .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
	   
	           /* 兑换商店排版 */
	           #shop-items .info-row {
	             display: flex;
	             align-items: flex-start;
	             justify-content: flex-start;

	           .label { color: #aaa; }

	           /* 导航 */

	           /* 游戏理解布局 */

	             background: linear-gradient(135deg, #333 0%, #222 100%);

	             font-size: 14px;
	           }

	             font-size: 14px;
	             text-align: center;
	             cursor: pointer;
	           }

	             display: none;

	           }

	             background: #3a4a5a;
	             color: #fff;
	             border: none;
	             border-bottom: 1px solid #1f2f3f;
	             font-size: 12px;
	             text-align: center;
	             cursor: pointer;
	           }
	           #attr-content {
	             flex: 1; 
	             padding: 15px;
	             background: #2a2a2a;
	             border-radius: 0 8px 8px 0;
	             height: 100%;
	             overflow-y: auto;
	           }
	   
	           /* 加载动画 */
	           .spin {
	             display: inline-block;
	             width: 14px;
	             height: 14px;
	             border: 2px solid #FFD700;
	             border-top-color: transparent;
	             border-radius: 50%;
	             animation: spin 0.8s linear infinite;
	             margin-right: 6px;
	           }
	           @keyframes spin {
	             to { transform: rotate(360deg); }
	           }
	   
	           /* 状态提示 */
	           .status-tip {
	             padding: 10px;
	             border-radius: 8px;
	             margin: 10px 0;
	             font-size: 14px;
	           }

	           }
	           .status-error {
	             background: #442222;
	             color: #ff6b6b;
	           }
	   
	           /* ID弹窗 */
	           #id-input-modal {
	             position: fixed; top: 0; left: 0; width: 100%; height: 100%;
	             background: rgba(0,0,0,0.8); z-index: 99999;
	             display: none; justify-content: center; align-items: center;
	           }
	           .modal-content {
	             background: #2a2a2a; border-radius: 12px; padding: 25px;
	             width: 90%; max-width: 350px; border: 1px solid #444;
	           }
	           .modal-title {
	             font-size: 18px; font-weight: bold; color: #FFD700;

	           }

	       </style>

	   <script>
	   // ==================== 全局配置 ====================
	   const GITHUB_URL = "https://raw.githubusercontent.com/Bandzy0711/GQLXX/main/data.json";
	   const SHOP_URL = "https://raw.githubusercontent.com/Bandzy0711/GQLXX/main/shop.json";
	   let CAMP_DATA = [];
	   let isLoading = false;
	   
	  // ==================== 引导页 ====================
	  document.addEventListener('DOMContentLoaded', () => {
	    document.querySelector('.enter-btn').onclick = () => {
	      document.getElementById('guide-page').style.opacity = 0;
	      setTimeout(() => {
	        document.getElementById('guide-page').style.display = 'none';
	        document.getElementById('main-app').style.display = 'block';
	        // 进入营地自动加载兑换商店数据，解决空白
	        loadShop();
	      }, 500);
	    };
	  });
	  // ==================== ID弹窗 ====================
	  function openIdModal() {
	    const modal = document.getElementById('id-input-modal');
	    const input = document.getElementById('game-id-input');
	    const suggestBox = document.getElementById('name-suggest');
	    modal.style.display = 'flex';
	    suggestBox.style.display = 'none';
	    // 永久读取本地存储，关闭页面再打开依然存在
	    const saveId = localStorage.getItem('campUserId') ?? "";
	    input.value = saveId;
	    input.focus();
	  }
	  function closeIdModal() {
	    document.getElementById('id-input-modal').style.display = 'none';
	  }
	  function confirmIdInput() {
	    const id = document.getElementById('game-id-input').value.trim();
	    closeIdModal();
	    if (!id) {
	      alert("ID不能为空");
	      openIdModal();
	      return;
	    }
	    // 输入确定永久存入本地
	    localStorage.setItem('campUserId', id);
	    loadUserInfoReal();
	  }
	   
	   // ==================== 网络请求工具 ====================
	   async function fetchWithTimeout(url, timeout = 10000) {
	     const controller = new AbortController();
	     const timer = setTimeout(() => controller.abort(), timeout);
	     try {
	       const res = await fetch(url + "?t=" + Date.now(), { signal: controller.signal });
	       clearTimeout(timer);
	       if (!res.ok) throw new Error("服务器异常");
	       return await res.json();
	     } catch (err) {
	       clearTimeout(timer);
	       throw err;
	     }
	   }
	   
	   
	   // ==================== 我的信息 ====================
	   async function loadUserInfoReal() {
	     if (isLoading) return;
	     isLoading = true;
	   
	     const status = document.getElementById('user-status');
	     const info = document.getElementById('user-info');
	     const retryBtn = document.getElementById('retry-user-btn');
	     const switchBtn = document.getElementById('switch-account-btn-local');
	     const feedbackBtn = document.getElementById('feedback-btn');
	   
	     status.className = "status-tip status-loading";
	     status.innerHTML = '<span class="spin"></span>正在获取你的信息...';
	     status.style.display = "block";
	     info.style.display = "none";
	     retryBtn.style.display = "none";
	     switchBtn.style.display = "none";
	     feedbackBtn.style.display = "none";
	   
	     try {
	       const userId = localStorage.getItem('campUserId');
	       if (!userId) {
	         status.innerHTML = "请先设置你的游戏ID";
	         openIdModal();
	         isLoading = false;
	         return;
	       }
	   
	       let raw = null;
	       const urls = [
	         "https://ghproxy.net/" + GITHUB_URL,
	         "https://gh-proxy.com/" + GITHUB_URL,
	         GITHUB_URL
	       ];
	   
	       for (let u of urls) {
	         try { raw = await fetchWithTimeout(u,8000); if(raw) break; } catch(e){}
	       }
	       if (!raw) throw new Error("所有线路失败，这不是你的错，也不是我们的问题qwq");
	   
	       CAMP_DATA = raw.map(item => {
	         // 基础固定字段
	         const baseInfo = {
	           id: item["姓名列"] ?? "",
	           join: item["入营时间"] ?? "",
	           job: item["公共职务或身份"] ?? "",
	           workDay: item["公职日期"] ?? "",
	           count: item["参与次数"] ?? "0",
	           gold: item["累计金额"] ?? "0",
	           targetTech: item["应达科技点"] ?? "",
	           realTech: item["实际科技点"] ?? "",
	           note: item["备注"] ?? "",
	           // 核销数组，自动存放所有核销记录
	           writeOffList: []
