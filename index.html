 // ========== 我的信息-生成核销记录 ==========
 function generateWriteoffRecords(userData) {
     try {
         const list = document.getElementById('writeoff-list');
         if (!list) return;
         
         list.innerHTML = '';
         let hasRecord = false;
 
         const writeoffTimes = [
             { key: '第一次', index: 1 },
             { key: '第二次', index: 2 }
         ];
 
         for (const item of writeoffTimes) {
             const dateKey = `${item.key}核销日期`;
             const amountKey = `${item.key}核销金额`;
             const date = userData[dateKey] || '';
             const amount = userData[amountKey] || 0;
 
             if (date.trim() || Number(amount) > 0) {
                 list.innerHTML += `<div class="info-row"><span class="label">第${item.index}次核销时间：</span><span class="value">${date || '无日期'}，金额：${amount}</span></div>`;
                 hasRecord = true;
             }
         }
 
         if (!hasRecord) {
             list.innerHTML = `<div class="info-row"><span class="label">核销记录：</span><span class="value">暂无核销记录</span></div>`;
         }
     } catch (e) {
         console.log("核销记录生成失败", e);
     }
 }

// ========== 我的信息-加载用户数据 ==========
function loadUserInfo() {
    try {
        // 1. 获取元素
        const loadingDiv = document.getElementById('loading');
        const userInfoDiv = document.getElementById('user-info');
        const switchBtn = document.getElementById('switch-account-btn-local');
        const feedbackBtn = document.getElementById('feedback-btn');

        // 2. 初始状态
        if (loadingDiv) loadingDiv.style.display = 'block';
        if (userInfoDiv) userInfoDiv.style.display = 'none';
        if (switchBtn) switchBtn.style.display = 'none';
        if (feedbackBtn) feedbackBtn.style.display = 'none';

        // 3. 读取或输入ID
        let savedId = localStorage.getItem('campUserId');
        if (!savedId) {
            savedId = prompt("请输入你的游戏id（过长或特殊id会简化处理，请询问市长）：");
            if (!savedId || savedId.trim() === '') {
                alert("id不能为空！");
                if (loadingDiv) loadingDiv.style.display = 'none';
                return;
            }
            savedId = savedId.trim();
            localStorage.setItem('campUserId', savedId);
        }

        // 4. 查找数据
        const matchItem = CAMP_DATA.find(item => {
            const fieldValue = item.id;
            return fieldValue && fieldValue.toString().trim() === savedId;
        });

        if (matchItem) {
            const userData = matchItem;
            const today = new Date(); // 自动获取当前日期

            // 填充游戏ID
            const userIdEl = document.getElementById('user-id');
            if (userIdEl) userIdEl.textContent = userData.id || '未填写';

            // ====================== 入营天数配色逻辑 ======================
            const joinTimeEl = document.getElementById('join-time');
            if (joinTimeEl) {
                // 重置样式
                joinTimeEl.style.color = '';
                joinTimeEl.style.fontWeight = 'bold'; // 所有层级都加粗
                joinTimeEl.style.textShadow = '';
                
                const joinTimeStr = userData['入营时间'] || '';
                if (joinTimeStr && joinTimeStr.trim() !== '') {
                    const joinDate = new Date(joinTimeStr);
                    if (!isNaN(joinDate.getTime())) {
                        const diffTime = today - joinDate;
                        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                        joinTimeEl.textContent = `${joinTimeStr}（${diffDays} 天）`;
                        
                        // 入营天数梯度配色（从大到小判断）
                        if (diffDays >= 1024) {
                            joinTimeEl.style.color = '#001F3F'; // 藏青色
                            joinTimeEl.style.textShadow = '2px 2px 2px #FFD700'; // 2px 金色描边
                        } else if (diffDays >= 570) {
                            joinTimeEl.style.color = '#9932CC'; // 青紫色
                            joinTimeEl.style.textShadow = '2px 2px 1px #FFD700'; // 2px 金色细边
                        } else if (diffDays >= 365) {
                            joinTimeEl.style.color = '#8A2BE2'; // 紫蓝色
                            joinTimeEl.style.textShadow = '2px 2px 2px #FFF'; // 2px 白色粗描边
                        } else if (diffDays >= 270) {
                            joinTimeEl.style.color = '#0000FF'; // 宝蓝色
                            joinTimeEl.style.textShadow = '1px 1px 1px #FFF'; // 1px 白色描边
                        } else if (diffDays >= 90) {
                            joinTimeEl.style.color = '#4B0082'; // 靛蓝色
                            joinTimeEl.style.textShadow = '1px 1px 1px #FFF'; // 1px 白色描边
                        } else if (diffDays >= 60) {
                            joinTimeEl.style.color = '#1E90FF'; // 天蓝色
                            joinTimeEl.style.textShadow = '1px 1px 1px #000'; // 1px 黑色描边
                        } else if (diffDays >= 30) {
                            joinTimeEl.style.color = '#87CEEB'; // 浅蓝色
                            joinTimeEl.style.textShadow = '1px 1px 1px #000'; // 1px 黑色描边
                        }
                    } else {
                        joinTimeEl.textContent = joinTimeStr;
                    }
                } else {
                    joinTimeEl.textContent = '未填写';
                }
            }

            // ====================== 公职工龄配色逻辑 ======================
            const workAgeEl = document.getElementById('work-age');
            if (workAgeEl) {
                // 重置样式
                workAgeEl.style.color = '';
                workAgeEl.style.fontWeight = 'bold'; // 所有层级都加粗
                workAgeEl.style.textShadow = '';
                
                const workAgeStr = userData['公职工龄'] || '';
                if (workAgeStr && workAgeStr.trim() !== '') {
                    const workAgeDate = new Date(workAgeStr);
                    if (!isNaN(workAgeDate.getTime())) {
                        const diffTime = today - workAgeDate;
                        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                        workAgeEl.textContent = `${workAgeStr}（${diffDays} 天）`;
                        
                        // 公职工龄梯度配色（从大到小判断）
                        if (diffDays >= 2048) {
                            workAgeEl.style.color = '#FF8C00'; // 赤金色
                            workAgeEl.style.textShadow = '3px 3px 2px #000'; // 3px 黑色超粗描边
                        } else if (diffDays >= 1024) {
                            workAgeEl.style.color = '#FFD700'; // 纯金色
                            workAgeEl.style.textShadow = '2px 2px 2px #000'; // 2px 黑色粗描边
                        } else if (diffDays >= 570) {
                            workAgeEl.style.color = '#B8860B'; // 暗金色
                            workAgeEl.style.textShadow = '2px 2px 1px #FF0000'; // 2px 红色细边
                        } else if (diffDays >= 365) {
                            workAgeEl.style.color = '#800020'; // 酒红色
                            workAgeEl.style.textShadow = '2px 2px 2px #FFF'; // 2px 白色粗描边
                        } else if (diffDays >= 270) {
                            workAgeEl.style.color = '#B22222'; // 砖红色
                            workAgeEl.style.textShadow = '1px 1px 1px #FFF'; // 1px 白色描边
                        } else if (diffDays >= 90) {
                            workAgeEl.style.color = '#FF4500'; // 橘红色
                            workAgeEl.style.textShadow = '1px 1px 1px #FFF'; // 1px 白色描边
                        } else if (diffDays >= 60) {
                            workAgeEl.style.color = '#FFA500'; // 橙黄色
                            workAgeEl.style.textShadow = '1px 1px 1px #000'; // 1px 黑色描边
                        } else if (diffDays >= 30) {
                            workAgeEl.style.color = '#FFD580'; // 浅橙色
                            workAgeEl.style.textShadow = '1px 1px 1px #000'; // 1px 黑色描边
                        }
                    } else {
                        workAgeEl.textContent = workAgeStr;
                    }
                } else {
                    workAgeEl.textContent = '未填写';
                }
            }

            // 公共职务或身份
            const publicIdentityEl = document.getElementById('public-identity');
            if (publicIdentityEl) {
                publicIdentityEl.textContent = userData['公共职务或身份'] || '未设置';
            }

            // 参与次数
            const joinCountEl = document.getElementById('join-count');
            if (joinCountEl) joinCountEl.textContent = userData['参与次数'] || 0;

            // 可兑换奖励
            const goldBalanceEl = document.getElementById('gold-balance');
            if (goldBalanceEl) goldBalanceEl.textContent = (userData['目前可兑换奖励数量'] || 0) + ' 金条';

            // 备注
            const remarkEl = document.getElementById('remark');
            if (remarkEl) remarkEl.textContent = userData['备注'] || '无';

            // 生成核销记录
            generateWriteoffRecords(userData);

            // 5. 显示内容
            if (loadingDiv) loadingDiv.style.display = 'none';
            if (userInfoDiv) userInfoDiv.style.display = 'block';
            if (switchBtn) switchBtn.style.display = 'block';
            if (feedbackBtn) feedbackBtn.style.display = 'block';
        } else {
            alert(`未找到ID为「${savedId}」的信息！`);
            localStorage.removeItem('campUserId');
            if (loadingDiv) loadingDiv.style.display = 'none';
        }
    } catch (error) {
        console.error("加载出错：", error);
        alert("加载出错了，请刷新页面重试！");
        const loadingDiv = document.getElementById('loading');
        if (loadingDiv) loadingDiv.style.display = 'none';
    }
}

// ========== 游戏理解-显示专研消耗（完整版·无任何省略） ==========
function showResearch() {
  const title = document.getElementById('attr-title');
  const info = document.getElementById('attr-info');
  const content = document.getElementById('attr-content');
  const isShow = content.style.display === 'block';
  const isCurrentContent = title.textContent === '专研消耗';

  // 面板显示/隐藏切换逻辑
  if (isShow && isCurrentContent) {
    content.style.display = 'none';
    title.textContent = '属性加成';
    info.innerHTML = '';
    return;
  }

  // 显示面板，渲染基础结构
  content.style.display = 'block';
  title.textContent = '专研消耗';

  // 渲染二级按钮栏 + 内容容器
  info.innerHTML = `
    <div style="display: flex; gap: 8px; margin-bottom: 12px;" id="research-tab-btns">
      <button id="tab-version" onclick="renderVersionResearch()" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: #425a70; color: #fff; font-weight: bold;">版本专研</button>
      <button id="tab-evolve" onclick="renderEvolveResearch()" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: #333; color: #aaa; font-weight: bold;">进化专研</button>
      <button id="tab-starup" onclick="renderStarUpResearch()" style="flex: 1; padding: 8px; border-radius: 8px; border: none; background: #333; color: #aaa; font-weight: bold;">升星</button>
    </div>
    <div id="research-content" style="max-height: 70vh; overflow-y: auto; padding: 4px;"></div>
  `;

  // 默认渲染版本专研内容
  renderVersionResearch();
}

// ========== 标签页按钮样式切换（完整版） ==========
function switchTabActive(activeTabId) {
  const tabList = ['tab-version', 'tab-evolve', 'tab-starup'];
  tabList.forEach(tabId => {
    const tabBtn = document.getElementById(tabId);
    if (tabId === activeTabId) {
      tabBtn.style.background = '#425a70';
      tabBtn.style.color = '#fff';
    } else {
      tabBtn.style.background = '#333';
      tabBtn.style.color = '#aaa';
    }
  });
}

// ========== 首页进入逻辑 ==========
document.addEventListener('DOMContentLoaded', function() {
  const guidePage = document.getElementById('guide-page');
  const mainApp = document.getElementById('main-app');
  const enterBtn = document.getElementById('enter-btn');

  if(enterBtn) {
      enterBtn.addEventListener('click', function() {
        guidePage.style.opacity = '0';
        setTimeout(function() {
          guidePage.style.display = 'none';
          mainApp.style.display = 'block';
        }, 500);
      });
  }
});

// ========== 打开本周反馈 ==========
function openFeedback() {
  // 隐藏所有页面
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  // 取消所有导航高亮
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  
  // 显示本周反馈页面
  const page8 = document.getElementById('page8');
  if(page8) page8.style.display = 'block';
  
  // 修改标题
  const headerTitle = document.getElementById('header-title');
  if(headerTitle) headerTitle.textContent = '本周反馈';
  
  // 显示返回按钮
  const backBtn = document.getElementById('back-btn');
  if(backBtn) backBtn.style.display = 'block';
}

// ========== 返回上一级（我的信息） ==========
function goBack() {
  // 隐藏返回按钮
  const backBtn = document.getElementById('back-btn');
  if(backBtn) backBtn.style.display = 'none';
  
  // 切换回「我的信息」
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(i => i.classList.remove('active'));
  
  // 找到「我的信息」的导航并高亮
  let targetNav = null;
  navItems.forEach(item => {
      if(item.getAttribute('data-page') === 'page6') {
          item.classList.add('active');
          targetNav = item;
      }
  });

  // 显示我的信息页面
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page6').style.display = 'block';
  
  // 修改标题
  const headerTitle = document.getElementById('header-title');
  if(headerTitle && targetNav) headerTitle.textContent = targetNav.textContent;
  
  // 重新加载用户信息
  loadUserInfo();
}
